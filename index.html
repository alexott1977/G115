<!doctype html>
<html lang="de-DE" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Aircraft Performance</title>
    <meta name="theme-color" content="#005f8a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Aircraft Performance" />
    <script>
      (() => {
        const preference =
          localStorage.getItem("g115b-theme") || "auto";
        const dark =
          preference === "dark" ||
          (preference === "auto" &&
            matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
        document.documentElement.dataset.themePreference = preference;
        document.documentElement.style.colorScheme = dark ? "dark" : "light";
      })();
    </script>
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%icons/favicon-32-v2.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/apple-touch-icon-v2.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
